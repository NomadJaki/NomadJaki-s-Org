<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaki — Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <header>
      <div class="site-title">Jaki</div>
      <details class="menu">
        <summary class="menu-button">Menu</summary>
        <nav class="menu-panel" aria-label="Site">
          <ul>
            <li><a href="index.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="https://github.com/NomadJaki" target="_blank" rel="noopener noreferrer">GitHub</a></li>
          </ul>
        </nav>
      </details>
    </header>

    <main>
      <section id="contact">
        <h2>Get In Touch</h2>
        <p>If you want to collaborate or have feedback, send me a message.</p>

        <form id="contact-form">
          <div>
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="Jane Smith" />
          </div>
          <div>
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required placeholder="jane@example.com" />
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="Say hello..." rows="5"></textarea>
          </div>
          <button class="button" type="submit" id="submit-btn">Send Message</button>
          <p id="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </div>

  <script>
    // ── Supabase config ─────────────────────────────────────────────
    // Replace these two values with YOUR project URL and anon key
    const SUPABASE_URL = "https://keebqlpioucdyfisvrtm.supabase.co";
    const SUPABASE_ANON = "sb_publishable_1OMQjJQpBuylD8WJ68T0ow_FKjvNKRh";

    // ── Form submission handler ──────────────────────────────────────
    document.getElementById("contact-form").addEventListener("submit", async function (event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const btn = document.getElementById("submit-btn");
      const status = document.getElementById("form-status");

      btn.disabled = true;
      btn.textContent = "Sending...";
      status.textContent = "";

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_ANON,
            Authorization: `Bearer ${SUPABASE_ANON}`,
            Prefer: "return=minimal",
          },
          body: JSON.stringify({ name, email, message }),
        });

        if (response.ok) {
          status.textContent = "✓ Message sent! I will be in touch soon.";
          status.style.color = "#1A7A4A";
          event.target.reset();
        } else {
          const err = await response.json();
          console.error("Supabase error:", err);
          status.textContent = "Something went wrong. Please try again.";
          status.style.color = "#DC2626";
        }
      } catch (networkError) {
        console.error("Network error:", networkError);
        status.textContent = "Could not connect. Check your internet connection.";
        status.style.color = "#DC2626";
      } finally {
        btn.disabled = false;
        btn.textContent = "Send Message";
      }
    });
  </script>
</body>
</html>
